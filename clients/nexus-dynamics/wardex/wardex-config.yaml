# Wardex Configuration — Nexus Dynamics (v2.1.2)
# Standard product (Art. 6), SaaS manufacturing, low maturity

release_gate:
  enabled: true
  risk_appetite: 0.35
  warn_above: 0.20
  mode: "any"
  asset_context:
    criticality: 0.65
    internet_facing: true
    requires_auth: true
    environment: "production"
  compensating_controls: []

acceptance:
  limits:
    max_acceptance_days: 90
    min_justification_chars: 20
    max_report_age_hours: 24

reporting:
  format: "json"
  output: "reports/wardex-report.json"
  gate_log:
    path: "reports/wardex-gate-audit.log"

cra:
  art14:
    output_dir: "reports"
    awareness_source: "detection"
    product_name: "NexusFlow"
    product_version: "2.3"
    kev_path: "kev-catalogue-stub.json"
    kev_max_age_days: 7
