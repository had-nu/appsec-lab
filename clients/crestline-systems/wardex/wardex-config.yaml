# Wardex Configuration — Crestline Systems (v2.1.2)
# Class I (Annex III), IIoT gateway, SBOM mandatory

release_gate:
  enabled: true
  risk_appetite: 0.20
  warn_above: 0.12
  mode: "any"
  asset_context:
    criticality: 0.85
    internet_facing: false
    requires_auth: true
    environment: "industrial"
  compensating_controls:
    - type: "network_segmentation"
      effectiveness: 0.25
      justification: "IIoT gateway on isolated OT network segment"

acceptance:
  limits:
    max_acceptance_days: 60
    min_justification_chars: 30
    max_report_age_hours: 12
  banned_justification_phrases:
    - "legacy code"
    - "no time to fix"

reporting:
  format: "json"
  output: "reports/wardex-report.json"
  gate_log:
    path: "reports/wardex-gate-audit.log"

cra:
  art14:
    output_dir: "reports"
    awareness_source: "detection"
    product_name: "EdgeSentry"
    product_version: "1.4"
    kev_path: "kev-catalogue-stub.json"
    kev_max_age_days: 7
