# Wardex SBOM validation policy — Crestline Systems
# EdgeSentry v1.4 must have a complete SBOM before release

sbom_requirements:
  format: "cyclonedx"
  version: "1.5"
  required_fields:
    - "bomFormat"
    - "specVersion"
    - "serialNumber"
    - "version"
    - "components"
  min_components: 5
