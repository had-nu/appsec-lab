services:

  # ──────────────────────────────────────────────
  # SAST: Semgrep — pattern-based static analysis
  # Scans source code for the active client
  # Output: reports/semgrep.json
  # ──────────────────────────────────────────────
  semgrep:
    image: returntocorp/semgrep:latest
    volumes:
      - ./src/${CLIENT:-nexus-dynamics}:/src:ro
      - ./reports:/reports
    command: >
      semgrep scan
        --config=auto
        --json
        --output=/reports/semgrep.json
        --severity=WARNING
        --no-git-ignore
        /src
    profiles: ["sast"]

  # ──────────────────────────────────────────────
  # SAST: Bearer — privacy/security focused SAST
  # Particularly good at data flow and sensitive data exposure
  # Output: reports/bearer.json
  # ──────────────────────────────────────────────
  bearer:
    image: bearer/bearer:latest
    volumes:
      - ./src/${CLIENT:-nexus-dynamics}:/app/src:ro
      - ./config:/app/config:ro
      - ./reports:/app/reports
    command: >
      scan /app/src
        --config-file=/app/config/bearer-config.yml
        --format=json
        --output=/app/reports/bearer.json
    profiles: ["sast"]

  # ──────────────────────────────────────────────
  # SCA: Trivy — dependency + container vulnerability scanner
  # Filesystem scan of the active client's source
  # Output: reports/trivy-fs.json
  # ──────────────────────────────────────────────
  trivy-fs:
    image: aquasec/trivy:latest
    volumes:
      - ./src/${CLIENT:-nexus-dynamics}:/src:ro
      - ./reports:/reports
      - trivy-cache:/root/.cache/trivy
    command: >
      fs /src
        --format json
        --output /reports/trivy-fs.json
        --severity HIGH,CRITICAL
        --scanners vuln,secret
    profiles: ["sca"]

  # ──────────────────────────────────────────────
  # IaC: Trivy config — misconfiguration scanning
  # Scans Dockerfiles, Compose files, GitHub Actions
  # Output: reports/trivy-iac.json
  # ──────────────────────────────────────────────
  trivy-iac:
    image: aquasec/trivy:latest
    volumes:
      - ./:/workspace:ro
      - ./reports:/reports
      - trivy-cache:/root/.cache/trivy
    command: >
      config /workspace
        --format json
        --output /reports/trivy-iac.json
        --severity HIGH,CRITICAL
    profiles: ["iac"]

  # ──────────────────────────────────────────────
  # IaC: Checkov — IaC misconfiguration scanner
  # Scans Dockerfiles, Compose files, GitHub Actions
  # Output: reports/checkov.json
  # ──────────────────────────────────────────────
  checkov:
    image: bridgecrew/checkov:latest
    volumes:
      - ./:/workspace:ro
      - ./reports:/reports
    command: >
      -d /workspace
        --output json
        --output-file-path /reports
        --quiet
        --framework dockerfile,github_actions,secrets
    profiles: ["iac"]

  # ──────────────────────────────────────────────
  # CRA: Wardex — compliance gate for CRA Art. 14
  # Evaluates vulnerability reports against KEV/EPSS thresholds
  # Requires CLIENT env var (e.g. nexus-dynamics)
  # Output: clients/${CLIENT}/reports/wardex-report.json
  #
  # NOTE: This service is consumed via `docker compose run` (not `up`)
  # in run.sh, which overrides the entrypoint command with the
  # appropriate flags for each client.
  # ──────────────────────────────────────────────
  wardex:
    build:
      context: .
      dockerfile: Dockerfile.wardex
    volumes:
      - ./clients/${CLIENT}:/workspace/client:ro
      - ./clients/${CLIENT}/reports:/workspace/reports
    environment:
      - WARDEX_ACTOR=${USER:-practitioner}
      - WARDEX_ACCEPT_SECRET=${WARDEX_ACCEPT_SECRET:-wardex-lab-dev-secret-not-for-prod}
    profiles: ["wardex"]

networks:
  lab-net:
    driver: bridge

volumes:
  trivy-cache:
