name: CRA — Nexus Dynamics

on:
  push:
    paths:
      - 'clients/nexus-dynamics/**'
      - 'src/**'
  workflow_dispatch:

env:
  CLIENT: nexus-dynamics

jobs:
  pre-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate artifact envelope
        run: ./run.sh cra-check

  sast:
    needs: pre-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh sast

  sca:
    needs: pre-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh sca

  iac:
    needs: pre-eval
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh iac

  wardex-gate:
    needs: [sast, sca]
    runs-on: ubuntu-latest
    env:
      WARDEX_ACCEPT_SECRET: ${{ secrets.WARDEX_ACCEPT_SECRET || 'wardex-lab-dev-secret-not-for-prod' }}
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh wardex

  compliance-check:
    needs: wardex-gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh compliance-report

  report:
    needs: [sast, sca, iac, wardex-gate, compliance-check]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: ./run.sh report
